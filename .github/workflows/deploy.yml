name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
      - claude/fishbowl-p2p-game-e02vet
  workflow_dispatch:

# Permissions the GITHUB_TOKEN needs to publish to Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# Only one Pages deployment at a time; let a new one supersede an in-flight run.
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - name: Run tests
        run: npm test
      # Enables GitHub Pages on first run (build_type = workflow) and
      # exposes ${{ steps.pages.outputs.base_path }} for the site URL.
      - name: Configure Pages
        id: pages
        uses: actions/configure-pages@v5
        with:
          enablement: true
      - name: Build
        run: npm run build
        env:
          # Project site lives at https://<user>.github.io/Murrays-game/
          BASE_PATH: /Murrays-game/
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
